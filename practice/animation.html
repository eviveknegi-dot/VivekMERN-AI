<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heart beat</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            background-color:white ;
            height: 70%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .heart{
            width: 171px;
            height: 60%;
            border-radius: 40%;
            animation: heartbeat 0.5s infinite ;
            background-color: white;
        }
        @keyframes heartbeat{
            0% {
                transform: scale(0.5);
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="heart">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQwrdlGXDznyXXAVUfIQemHAFT--lbsFtwOnO1bNaOZvCVSIW6STNR4smfL&s=10" alt="" class="heart">
        </div>
    </div>
</body>
</html>
