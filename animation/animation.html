<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation For Website</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: royalblue;
            position:relative;
            overflow: hidden;
            height: 100vh;
            /* width: 90%; */
        }
        .size{
            width: 100%;
            height: 100%;
        }
        .city-image > img{
            position: absolute;
            overflow: hidden;
            bottom: 10%;
            width: 250%;
            /* animation: cityMove 1s infinite linear; */
            
        }
        .road{
            position: absolute;
            display: flex;
            /* overflow: hidden; */
            bottom: 0%;
            width: 200%;
            /* height: 100px; */
            animation: roadMove 20s infinite linear;
        }
        .flight{
            position: absolute;
            height: 0%;
            left: 80%;
        }
        .truck{
            position: absolute;
            /* height: 100px;
            width: 40%; */
            bottom: 0%;
            left: 60%;
            /* animation: truckMove 1s infinite linear ;  */
        }
/* 
        @keyframes truckMove {
            0%{
                transform: translateX(50%);
            }
                        100%{
                transform: translateX(60%);
            }
            
        } */
        
        @keyframes roadMove{
            from{
                transform: translateX(0%);
            }
            to{
                transform: translateX(-50%);
            }
            
        }
        @keyframes cityMove {
            0% {
                transform: translateX(0%);
            }
            100%{
                transform: translateX(100%);
            }
            
        }
    </style>

</head>
<body>
    <div class="container size">
        <div class="city-image size">
            <img src="cityfotter.svg" alt="city-image">
        </div>
        <div class="road" >
            <img src="road.svg" alt="road" style="width:60%; height: 120%;" >
            <img src="road.svg" alt="road" style="bottom:20%; left:90%; width:60%; height: 12````0%;" >
        </div>
        <div class="flight">
            <img src="flight 1.svg" alt="flight-image" width="200%">
        </div>
        <div class="truck">
            <img src="truck.gif" alt="truck-moving" width="60%">
        </div>
    </div>

</body>
</html>
